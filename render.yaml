services:
  - type: web
    name: discovery-service
    env: docker
    plan: starter
    dockerfilePath: ./discovery-service/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: EUREKA_CLIENT_ENABLED
        value: true
      - key: EUREKA_CLIENT_REGISTER_WITH_EUREKA
        value: true
      - key: EUREKA_CLIENT_FETCH_REGISTRY
        value: true

  - type: web
    name: api-gateway
    env: docker
    plan: starter
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8080/eureka/
      - key: JWT_SECRET
        value: my-super-secret-key-for-jwt-signing-32chars-min

  - type: web
    name: user-service
    env: docker
    plan: starter
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: ${DATABASE_URL}
      - key: SPRING_DATASOURCE_USERNAME
        value: ${DATABASE_USERNAME}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${DATABASE_PASSWORD}
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8080/eureka/
      - key: JWT_SECRET
        value: my-super-secret-key-for-jwt-signing-32chars-min

  - type: web
    name: dossier-service
    env: docker
    plan: starter
    dockerfilePath: ./dossier-service/Dockerfile
