services:
  - type: postgres
    name: postgres
    plan: starter
    databaseName: workflowdb
    databaseUser: postgres
    ipAllowList: []  # only accessible by other services

  - type: web
    name: discovery-service
    env: docker
    plan: starter
    dockerfilePath: ./discovery-service/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: EUREKA_CLIENT_ENABLED
        value: true
      - key: EUREKA_CLIENT_REGISTER_WITH_EUREKA
        value: true
      - key: EUREKA_CLIENT_FETCH_REGISTRY
        value: true

  - type: web
    name: api-gateway
    env: docker
    plan: starter
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        fromService:
          type: web
          name: discovery-service
          property: hostport
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: user-service
    env: docker
    plan: starter
    dockerfilePath: ./user-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromService:
          type: postgres
          name: postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromService:
          type: postgres
          name: postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          type: postgres
          name: postgres
          property: password
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        fromService:
          type: web
          name: discovery-service
          property: hostport
      - key: JWT_SECRET
        fromService:
          type: web
          name: api-gateway
          envVarKey: JWT_SECRET

  - type: web
    name: dossier-service
    env: docker
    plan: starter
    dockerfilePath: ./dossier-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromService:
          type: postgres
          name: postgres
          property: connectionString
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        fromService:
          type: web
          name: discovery-service
          property: hostport
      - key: JWT_SECRET
        fromService:
          type: web
          name: api-gateway
          envVarKey: JWT_SECRET

  - type: web
    name: workflow-service
    env: docker
    plan: starter
    dockerfilePath: ./workflow-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromService:
          type: postgres
          name: postgres
          property: connectionString
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        fromService:
          type: web
          name: discovery-service
          property: hostport
      - key: JWT_SECRET
        fromService:
          type: web
          name: api-gateway
          envVarKey: JWT_SECRET

  - type: web
    name: paiement-service
    env: docker
    plan: starter
    dockerfilePath: ./paiement-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromService:
          type: postgres
          name: postgres
          property: connectionString
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        fromService:
          type: web
          name: discovery-service
          property: hostport
      - key: JWT_SECRET
        fromService:
          type: web
          name: api-gateway
          envVarKey: JWT_SECRET

  - type: web
    name: notification-service
    env: docker
    plan: starter
    dockerfilePath: ./notification-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        fromService:
          type: web
          name: discovery-service
          property: hostport
      - key: JWT_SECRET
        fromService:
          type: web
          name: api-gateway
          envVarKey: JWT_SECRET

  - type: web
    name: document-service
    env: docker
    plan: starter
    dockerfilePath: ./document-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromService:
          type: postgres
          name: postgres
          property: connectionString
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        fromService:
          type: web
          name: discovery-service
          property: hostport
      - key: JWT_SECRET
        fromService:
          type: web
          name: api-gateway
          envVarKey: JWT_SECRET

  - type: web
    name: prometheus
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.prometheus
    dockerContext: .
    healthCheckPath: /-/healthy

  - type: web
    name: grafana
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.grafana
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: GF_SECURITY_ADMIN_PASSWORD
        value: admin
