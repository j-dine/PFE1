<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bureau d'Ordre — Plateforme Cloud</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f0ed;--white:#ffffff;--border:#ddd9d0;
  --ink:#1a1814;--muted:#7a7469;--faint:#b8b0a4;
  --blue:#1d4ed8;--blue-s:#dbeafe;--blue-d:#1e3a8a;
  --green:#15803d;--green-s:#dcfce7;
  --red:#dc2626;--red-s:#fee2e2;
  --amber:#b45309;--amber-s:#fef3c7;
  --purple:#6d28d9;--purple-s:#ede9fe;
  --teal:#0f766e;--teal-s:#ccfbf1;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.06);
}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.5}
/* ===== ROLE SWITCHER ===== */
.role-bar{background:var(--ink);color:white;padding:8px 20px;display:flex;align-items:center;gap:12px;font-size:12px;position:sticky;top:0;z-index:200}
.role-bar-label{color:rgba(255,255,255,.5);margin-right:4px}
.role-pill{padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2);cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.3px;transition:all .2s;white-space:nowrap}
.role-pill:hover{background:rgba(255,255,255,.1)}
.role-pill.active{background:white;color:var(--ink)}
.role-bar-right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,.5)}
.online-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== SHELL ===== */
.shell{display:flex;min-height:calc(100vh - 38px)}
.sidebar{width:220px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:38px;height:calc(100vh - 38px);overflow-y:auto;flex-shrink:0}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ===== SIDEBAR ===== */
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-brand{font-family:'Instrument Serif',serif;font-size:17px;font-style:italic;color:var(--ink)}
.sb-brand span{color:var(--blue);font-style:normal}
.sb-sub{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0}
.sb-name{font-size:12px;font-weight:700}
.sb-role{font-size:10px;color:var(--muted)}
.sb-nav{padding:10px 8px;flex:1}
.nav-section{margin-bottom:18px}
.nav-sec-title{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:1.5px;padding:0 8px;margin-bottom:5px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;margin-bottom:1px}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--blue-s);color:var(--blue);font-weight:600}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;background:var(--red);color:white}
.nav-badge.amber{background:var(--amber)}
.nav-badge.green{background:var(--green)}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sb-logout{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--muted);border-radius:8px;font-family:inherit;transition:all .15s}
.sb-logout:hover{background:var(--red-s);color:var(--red)}
.sb-logout svg{width:14px;height:14px}

/* ===== TOPBAR ===== */
.topbar{background:white;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:38px;z-index:100}
.topbar-title{font-family:'Instrument Serif',serif;font-size:19px;font-style:italic;flex:1}
.topbar-actions{display:flex;align-items:center;gap:8px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;font-family:inherit;transition:all .2s;white-space:nowrap}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-primary{background:var(--blue);color:white;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-d)}
.btn-outline{background:white;color:var(--ink);border-color:var(--border)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-success{background:var(--green);color:white;border-color:var(--green)}
.btn-success:hover{background:#166534}
.btn-danger{background:var(--red);color:white;border-color:var(--red)}
.btn-soft-danger{background:var(--red-s);color:var(--red);border-color:var(--red-s)}
.btn-soft-amber{background:var(--amber-s);color:var(--amber);border-color:var(--amber-s)}
.btn-soft-purple{background:var(--purple-s);color:var(--purple);border-color:var(--purple-s)}
.btn-sm{padding:5px 12px;font-size:11px}

/* ===== CONTENT ===== */
.content{padding:22px 24px;flex:1}

/* ===== STATS GRID ===== */
.stats{display:grid;gap:12px;margin-bottom:20px}
.stats-4{grid-template-columns:repeat(4,1fr)}
.stats-3{grid-template-columns:repeat(3,1fr)}
.stats-5{grid-template-columns:repeat(5,1fr)}
.stat-card{background:white;border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.sc-blue::after{background:var(--blue)}.sc-green::after{background:var(--green)}.sc-amber::after{background:var(--amber)}.sc-red::after{background:var(--red)}.sc-purple::after{background:var(--purple)}.sc-teal::after{background:var(--teal)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:700}
.stat-value{font-family:'Instrument Serif',serif;font-size:30px;line-height:1}
.stat-delta{font-size:10px;color:var(--muted);margin-top:6px}
.stat-delta.up{color:var(--green)}.stat-delta.down{color:var(--red)}

/* ===== WORKFLOW STEPPER ===== */
.workflow-strip{background:white;border:1px solid var(--border);border-radius:12px;padding:18px 24px;margin-bottom:20px;display:flex;align-items:center;gap:0}
.wf-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.wf-step:not(:last-child)::after{content:'';position:absolute;top:16px;left:55%;width:90%;height:2px;background:var(--border);z-index:0}
.wf-step.done:not(:last-child)::after{background:var(--blue)}
.wf-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--border);background:white;position:relative;z-index:1;transition:all .3s}
.wf-step.done .wf-circle{background:var(--blue);border-color:var(--blue);color:white}
.wf-step.active .wf-circle{border-color:var(--blue);color:var(--blue);box-shadow:0 0 0 4px var(--blue-s)}
.wf-label{font-size:10px;margin-top:7px;color:var(--muted);text-align:center;font-weight:500}
.wf-step.done .wf-label,.wf-step.active .wf-label{color:var(--ink);font-weight:600}

/* ===== CARDS ===== */
.card{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700}
.card-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* ===== TABLE ===== */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 18px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;background:var(--bg);border-bottom:1px solid var(--border)}
.tbl td{padding:13px 18px;font-size:12px;border-bottom:1px solid #f5f3ef}
.tbl tr:last-child td{border:none}
.tbl tr:hover td{background:#faf9f7}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.b-reception{background:#e0f2fe;color:#0369a1}
.b-enregistrement{background:#ede9fe;color:var(--purple)}
.b-traitement{background:var(--amber-s);color:var(--amber)}
.b-validation{background:#fce7f3;color:#be185d}
.b-paiement{background:var(--green-s);color:var(--green)}
.b-archive{background:#f1f5f9;color:#475569}
.b-rejete{background:var(--red-s);color:var(--red)}
.b-urgent{background:var(--red-s);color:var(--red)}
.b-normal{background:var(--bg);color:var(--muted)}
.b-high{background:var(--amber-s);color:var(--amber)}

/* ===== FORMS ===== */
.form-grid{display:grid;gap:14px}
.form-2{grid-template-columns:1fr 1fr}
.form-3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-select,.form-textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;color:var(--ink);background:white;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--blue)}
.form-textarea{resize:vertical;min-height:80px}
.form-select option{background:white}

/* ===== DOSSIER CARD ===== */
.dossier-card{background:white;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.dossier-card:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.dossier-card.sel{border-color:var(--blue);background:#fafcff}
.dossier-card.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.dc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.dc-ref{font-size:10px;font-weight:800;color:var(--blue);letter-spacing:.5px}
.dc-date{font-size:10px;color:var(--muted)}
.dc-obj{font-size:13px;font-weight:700;margin-bottom:3px}
.dc-from{font-size:11px;color:var(--muted)}
.dc-footer{display:flex;align-items:center;gap:6px;margin-top:10px}

/* ===== DETAIL PANEL ===== */
.detail-panel{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:80px}
.dp-header{padding:16px 18px;background:linear-gradient(135deg,var(--blue),var(--blue-d));color:white}
.dp-ref{font-size:10px;opacity:.7;margin-bottom:3px}
.dp-obj{font-weight:700;font-size:14px;line-height:1.3}
.dp-body{padding:18px}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bg);font-size:12px}
.dp-row:last-of-type{border:none}
.dp-key{color:var(--muted)}
.dp-val{font-weight:600;text-align:right}
.dp-actions{padding:14px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px}

/* ===== TIMELINE ===== */
.timeline{padding:0 18px 14px}
.tl-item{display:flex;gap:10px;padding:9px 0;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:13px;top:34px;bottom:0;width:1px;background:var(--border)}
.tl-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
.tl-dot svg{width:11px;height:11px}
.tl-title{font-size:11px;font-weight:700}
.tl-desc{font-size:10px;color:var(--muted);margin-top:1px}
.tl-time{font-size:9px;color:var(--faint);margin-top:2px}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(26,24,20,.45);backdrop-filter:blur(3px);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:white;border-radius:16px;width:560px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.18);animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Instrument Serif',serif;font-size:18px;font-style:italic}
.modal-close{width:30px;height:30px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted)}
.modal-close:hover{background:var(--red-s);color:var(--red)}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 18px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-md);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.toast-success{background:var(--green);color:white}
.toast-error{background:var(--red);color:white}
.toast-info{background:var(--blue);color:white}
.toast svg{width:14px;height:14px;flex-shrink:0}

/* ===== GRID LAYOUTS ===== */
.col-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.col-left-right{display:grid;grid-template-columns:1fr 340px;gap:18px}
.col-list-detail{display:grid;grid-template-columns:1fr 320px;gap:16px}

/* ===== MISC ===== */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.section-title{font-family:'Instrument Serif',serif;font-size:16px;font-style:italic;margin-bottom:14px}
.empty-state{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.divider{height:1px;background:var(--border);margin:14px 0}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.toggle{width:36px;height:20px;border-radius:10px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--blue)}.toggle.off{background:var(--border)}
.toggle-thumb{width:16px;height:16px;background:white;border-radius:50%;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle.on .toggle-thumb{left:18px}.toggle.off .toggle-thumb{left:2px}
.tag-row{display:flex;gap:6px;flex-wrap:wrap}
.user-av-sm{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:white;flex-shrink:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}

/* Notification dot */
.notif-btn{position:relative}
.notif-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid white}
</style>
</head>
