apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'discovery-service'
        static_configs:
          - targets: ['discovery-service:8761']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s

      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway:8080']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s

      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service:8081']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s

      - job_name: 'dossier-service'
        static_configs:
          - targets: ['dossier-service:8082']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s

      - job_name: 'workflow-service'
        static_configs:
          - targets: ['workflow-service:8083']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s

      - job_name: 'paiement-service'
        static_configs:
          - targets: ['paiement-service:8084']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s

      - job_name: 'notification-service'
        static_configs:
          - targets: ['notification-service:8085']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s

      - job_name: 'document-service'
        static_configs:
          - targets: ['document-service:8086']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 5s
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP