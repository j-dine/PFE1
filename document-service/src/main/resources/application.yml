server:
  port: 8086

spring:
  application:
    name: document-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/workflowdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  storage:
    upload-dir: ${APP_UPLOAD_DIR:/app/uploads}

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-for-jwt-signing-32chars-min}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
