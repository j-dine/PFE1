global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'discovery-service'
    static_configs:
      - targets: ['discovery-service:8761']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8081']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s

  - job_name: 'dossier-service'
    static_configs:
      - targets: ['dossier-service:8082']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s

  - job_name: 'workflow-service'
    static_configs:
      - targets: ['workflow-service:8083']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s

  - job_name: 'paiement-service'
    static_configs:
      - targets: ['paiement-service:8084']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8085']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s

  - job_name: 'document-service'
    static_configs:
      - targets: ['document-service:8086']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s